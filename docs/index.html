<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Weather Poem</title>

    <style>
        body {
            background: #fdf6e3;
            font-family: Georgia, "Times New Roman", serif;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .book {
            max-width: 700px;
            margin: 80px auto;
            padding: 60px;
            background: #fffaf0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        h1 {
            text-align: center;
            font-weight: normal;
            margin-bottom: 40px;
        }

        pre {
            white-space: pre-wrap;
            font-size: 18px;
            line-height: 1.8;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>

<body>

<div class="book">
    <h1>🌦️ Weather Poem</h1>

    <pre id="poem">Loading...</pre>

    <footer>
        Generated daily by AI ☁️
    </footer>
</div>

<script>
fetch("/automated-weather-pipeline/poem.txt")
    .then(response => response.text())
    .then(data => {
        document.getElementById("poem").textContent = data;
    });
</script>

</body>
</html>
